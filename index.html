<div>
  <script src="https://unpkg.com/@vkid/sdk@<3.0.0/dist-sdk/umd/index.js"></script>
  <script type="text/javascript">
    if ('VKIDSDK' in window) {
      const VKID = window.VKIDSDK;

      VKID.Config.init({
        app: 54609396,
        redirectUrl: 'https://apocryph01.github.io/',
        responseMode: VKID.ConfigResponseMode.Callback,
        scope: 'wall,friends,groups'
      });

      const oneTap = new VKID.OneTap();

      oneTap.render({
        container: document.currentScript.parentElement,
        showAlternativeLogin: true
      })
      .on(VKID.WidgetEvents.ERROR, vkidOnError)
      .on(VKID.OneTapInternalEvents.LOGIN_SUCCESS, function (payload) {
        // После успешного входа просто показываем код
        const code = payload.code;
        
        // Показываем пользователю его код для обмена на токен
        document.getElementById('result').innerHTML = `
          <div style="margin-top: 20px; padding: 10px; background: #f0f0f0;">
            <p>✅ Вход выполнен! Ваш код для получения токена:</p>
            <code style="display: block; word-break: break-all; background: white; padding: 10px;">${code}</code>
            <p>Обменяйте этот код на токен через:<br/>
            <code>https://oauth.vk.com/access_token?client_id=54609396&client_secret=ВАШ_КЛЮЧ&code=${code}&redirect_uri=https://apocryph01.github.io/</code></p>
          </div>
        `;
      })
      .on(VKID.WidgetEvents.ERROR, vkidOnError);

      function vkidOnSuccess(data) {
        document.getElementById('result').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
      }

      function vkidOnError(error) {
        document.getElementById('result').innerHTML = '<div style="color: red;">Ошибка: ' + JSON.stringify(error) + '</div>';
      }
    }
  </script>
  <div id="result"></div>
</div>
